name: Export Charmed Life Russian EPUB

on:
  push:
    branches:
      - assistant/charmed-life-ru-epub-export
    paths:
      - .github/workflows/export-charmed-life-ru.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/export-charmed-life-ru.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/charmed-life-ru-epub-export

      - name: Verify Russian EPUB
        shell: bash
        run: |
          test -f 'source/EPUB/RU/Djons_Diana_Uinn_[Miryi_Krestomansi#1]_Zakoldovannaya_jizn.epub'
          ls -lh 'source/EPUB/RU/Djons_Diana_Uinn_[Miryi_Krestomansi#1]_Zakoldovannaya_jizn.epub'

      - name: Upload Russian EPUB
        uses: actions/upload-artifact@v4
        with:
          name: charmed-life-ru-source
          path: source/EPUB/RU/Djons_Diana_Uinn_[Miryi_Krestomansi#1]_Zakoldovannaya_jizn.epub
          if-no-files-found: error
          retention-days: 1
